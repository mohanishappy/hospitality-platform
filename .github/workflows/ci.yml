# Quality checks on every push and PR; on main: tests → Supabase migrations → deploy Workers + Pages → post-deploy smoke.
# Secrets: CLOUDFLARE_*, SUPABASE_*, GATEWAY_BASE_URL, VITE_AUTH0_* (web deploy on main).

name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Typecheck all services
        run: npm run typecheck

  migrate:
    needs: quality
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing secret SUPABASE_PROJECT_REF"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Missing secret SUPABASE_DB_PASSWORD"
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --yes

  deploy:
    needs: [quality, migrate]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy inventory
        run: npm run deploy:inventory

      - name: Deploy reservations
        run: npm run deploy:reservations

      - name: Deploy gateway
        run: npm run deploy:gateway

  deploy-web:
    needs: quality
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_GATEWAY_URL: ${{ secrets.GATEWAY_BASE_URL }}
      VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
      VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
      VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy web to Cloudflare Pages (8E)
        run: |
          set -euo pipefail
          if [ -z "${VITE_AUTH0_CLIENT_ID:-}" ]; then
            echo "Skipping web deploy (VITE_AUTH0_CLIENT_ID not set)"
            exit 0
          fi
          for var in VITE_GATEWAY_URL VITE_AUTH0_DOMAIN VITE_AUTH0_AUDIENCE CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!var:-}" ]; then
              echo "Missing secret or env: $var"
              exit 1
            fi
          done
          npm run build:web
          npm run deploy -w hospitality-web

  smoke:
    needs: deploy
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Post-deploy public smoke (7A)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
        run: node scripts/smoke-deploy-public.mjs

      - name: Golden-path API smoke (7B)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          SMOKE_ACCESS_TOKEN: ${{ secrets.SMOKE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SMOKE_ACCESS_TOKEN:-}" ]; then
            echo "Skipping golden-path smoke (SMOKE_ACCESS_TOKEN not set)"
            exit 0
          fi
          node scripts/smoke-api.mjs

      - name: Newman Postman smoke (7G)
        env:
          GATEWAY_BASE_URL: ${{ secrets.GATEWAY_BASE_URL }}
          SMOKE_ACCESS_TOKEN: ${{ secrets.SMOKE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SMOKE_ACCESS_TOKEN:-}" ]; then
            echo "Skipping Newman (SMOKE_ACCESS_TOKEN not set)"
            exit 0
          fi
          node scripts/run-newman.mjs
