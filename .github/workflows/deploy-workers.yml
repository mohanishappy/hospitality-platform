# Deploy Cloudflare Workers when pushing to the default integration branch.
# Required repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Runtime secrets (Supabase, Auth0) must already be set on each Worker (wrangler secret / dashboard).

name: Deploy Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all services
        run: |
          (cd services/inventory && npx tsc --noEmit)
          (cd services/reservations && npx tsc --noEmit)
          (cd services/gateway && npx tsc --noEmit)

      - name: Deploy inventory
        run: npm run deploy:inventory

      - name: Deploy reservations
        run: npm run deploy:reservations

      - name: Deploy gateway
        run: npm run deploy:gateway
