# Apply `supabase/migrations/*.sql` to a linked Supabase project (remote Postgres).
# Manual workflow only. Pushes to `main` also run the same steps in `ci.yml` (before Worker deploy).
#
# Required repository secrets (GitHub → Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   — Account access token (Dashboard → Account → Access Tokens)
#   SUPABASE_PROJECT_REF    — Project Reference ID (Dashboard URL: /project/<ref> or Settings → General)
#   SUPABASE_DB_PASSWORD    — Database password (Settings → Database; reset if unknown)
#
# Optional: duplicate this workflow with different secret names for a staging project,
# or add a second job and map staging secrets.

name: Migrate database (Supabase)

on:
  workflow_dispatch:

concurrency:
  group: migrate-db-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          if [ -z "$PROJECT_REF" ]; then
            echo "Missing secret SUPABASE_PROJECT_REF"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Missing secret SUPABASE_DB_PASSWORD"
            exit 1
          fi
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --yes
